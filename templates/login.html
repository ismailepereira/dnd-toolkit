<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mestre's Toolkit</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>🐉 Mestre's Toolkit</h1>
      <p class="login-sub">Entre com seu usuário e senha</p>
      {% if erro %}<div class="login-erro">{{ erro }}</div>{% endif %}
      <form method="POST">
        <label>Usuário <input type="text" name="usuario" autocomplete="username" required></label>
        <label>Senha <input type="password" name="senha" autocomplete="current-password" required></label>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>
  <footer class="footer-attribuicao">
    Desenvolvido por <a href="https://ismailepereira.github.io/" target="_blank" rel="noopener">ismailepereira</a>
  </footer>
</body>
</html>
