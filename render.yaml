# Blueprint de deploy para o Render (https://render.com) — plano grátis.
# Conecte este repositório no Render que ele lê este arquivo automaticamente.
services:
  - type: web
    name: dnd-toolkit
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MESTRE_USER
        value: Ismaile
      - key: MESTRE_SENHA
        sync: false
      - key: JOGADOR_USER
        value: jogador
      - key: JOGADOR_SENHA
        sync: false
      # Fase 10.9 — assinatura manual (Pix + confirmação no /admin/assinaturas)
      - key: TRIAL_DIAS
        value: "3"
      - key: ASSINATURA_PRECO
        value: "R$ 5,00/mês"
      - key: PIX_CHAVE
        sync: false          # preencher no painel do Render (chave Pix real)
      - key: CONTATO_PAGAMENTO
        sync: false          # preencher no painel (WhatsApp/e-mail p/ comprovantes)
      # Firestore: NÃO usar env FIREBASE_KEY_JSON — preferir Secret File
      # chamado "firebase-key.json" (o app procura /etc/secrets/firebase-key.json).
      # Sem credencial o app cai no ficheiro local, que NO RENDER É EFÉMERO
      # (os dados somem a cada deploy/restart) — só serve para demonstração.
