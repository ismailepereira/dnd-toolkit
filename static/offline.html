<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão — D&D Toolkit</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #12121e; color: #e8e8f0; text-align: center; padding: 24px; }
    .box { max-width: 420px; }
    h1 { font-size: 3rem; margin: 0 0 8px; }
    p { color: #a8a8c0; line-height: 1.5; }
    button { margin-top: 16px; padding: 10px 20px; border: 0; border-radius: 8px; cursor: pointer;
      background: #e94560; color: #fff; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🐉</h1>
    <h2>Sem conexão</h2>
    <p>Você está offline e esta tela ainda não foi guardada para uso sem internet. Reconecte para voltar à mesa — a preparação (fichas, aventuras, compêndio) fica disponível offline depois de aberta uma vez.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
