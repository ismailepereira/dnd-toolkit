<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Jogador - D&D</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <h1>🎲 Área do Jogador</h1>
      <div class="user-info">
        <span>{{ usuario }}</span>
        {% if usuario == 'Ismaile' %}
        <a href="{{ url_for('mestre') }}" class="btn-secondary">Voltar ao Mestre</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="btn-danger">Sair</a>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="fichas">Minha Ficha</button>
      <button class="tab-btn" data-tab="bestiario">Bestiário</button>
      <button class="tab-btn" data-tab="progressao">Progressão</button>
    </nav>
  </header>

  <main>
    <!-- FICHAS -->
    <section id="fichas" class="tab-content active">
      <div class="panel-header">
        <h2>Fichas do Grupo</h2>
        <button id="novaFicha" class="btn-primary">+ Nova Ficha</button>
      </div>
      <div id="listaFichas" class="card-grid"></div>
    </section>

    <!-- BESTIÁRIO -->
    <section id="bestiario" class="tab-content">
      <div class="panel-header">
        <h2>Bestiário</h2>
        <input type="text" id="bestiaBusca" placeholder="Buscar monstro...">
      </div>
      <p class="aviso-mestre">Os monstros aparecem aqui quando o Mestre os libera.</p>
      <div id="listaMonstros" class="monstro-grid"></div>
    </section>

    <!-- PROGRESSÃO -->
    <section id="progressao" class="tab-content">
      <div class="panel-header">
        <h2>Progressão de Classe</h2>
        <div>
          <select id="progClasse"></select>
          <select id="progNivel"></select>
        </div>
      </div>
      <div id="progInfo" class="prog-info"></div>
      <div id="progTabela" class="prog-tabela"></div>
    </section>
  </main>

  {% include "_criador.html" %}

  <script src="{{ url_for('static', filename='js/classes.js') }}"></script>
  <script src="{{ url_for('static', filename='js/itens.js') }}"></script>
  <script src="{{ url_for('static', filename='js/monstros.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dados5e.js') }}"></script>
  <script src="{{ url_for('static', filename='js/criador.js') }}"></script>
  <script src="{{ url_for('static', filename='js/jogador.js') }}"></script>
  <footer class="footer-attribuicao">
    Desenvolvido por <a href="https://ismailepereira.github.io/" target="_blank" rel="noopener">ismailepereira</a>
  </footer>
</body>
</html>
